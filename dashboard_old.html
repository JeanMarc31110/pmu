<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMU Moulinette 2026</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#121936;
      --panel2:#182247;
      --text:#edf2ff;
      --muted:#aab6dc;
      --accent:#7aa2ff;
      --accent2:#3dd9b3;
      --accent3:#ffd166;
      --border:rgba(255,255,255,.08);
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#0a0f1f 0%,#0d1430 100%);
      color:var(--text);
    }
    .wrap{max-width:1250px;margin:0 auto;padding:24px}
    .card,.panel{
      background:rgba(18,25,54,.94);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .card{padding:22px}
    .panel{padding:18px}
    h1{margin:0 0 8px;font-size:32px;line-height:1.1}
    h2{margin:0 0 14px;font-size:18px}
    .subtitle{color:var(--muted);line-height:1.5;max-width:900px}
    .grid{display:grid;grid-template-columns:350px 1fr;gap:20px;margin-top:20px}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input{
      width:100%;
      border-radius:12px;
      border:1px solid var(--border);
      background:#0d1430;
      color:var(--text);
      padding:12px 14px;
      outline:none;
    }
    .btns{display:grid;gap:10px;margin-top:14px}
    button{
      border:0;
      border-radius:12px;
      padding:13px 16px;
      font-weight:700;
      cursor:pointer;
      color:#06101f;
      background:linear-gradient(135deg,var(--accent),#a7c1ff);
      font-size:14px;
    }
    button.secondary{
      background:linear-gradient(135deg,#2bd5b0,#8ef1dd);
    }
    button.third{
      background:linear-gradient(135deg,var(--accent3),#ffe7a3);
    }
    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }
    .status{
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      background:#0f1836;
      border:1px solid var(--border);
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      white-space:pre-wrap;
    }
    .cards{display:grid;gap:14px}
    .result-card{
      background:var(--panel2);
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
    }
    .result-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .title{font-weight:800;font-size:17px}
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid var(--border);
    }
    .pill.ok{color:#081814;background:#7ef0d1}
    .pill.warn{color:#2f2500;background:#ffe7a3}
    .pill.no{color:#2a0b0b;background:#ffc9c9}
    .meta{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
      margin-top:12px;
    }
    .meta .box{
      background:rgba(9,17,41,.65);
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
    }
    .meta .k{color:var(--muted);font-size:12px;margin-bottom:6px}
    .meta .v{font-weight:700}
    .table-wrap{
      overflow:auto;
      border:1px solid var(--border);
      border-radius:14px;
      margin-top:12px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width:720px;
    }
    th,td{
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      text-align:left;
      font-size:13px;
    }
    th{
      color:var(--muted);
      background:#0f1836;
      position:sticky;
      top:0;
    }
    .summary{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
      margin-bottom:14px;
    }
    .summary .box{
      background:#0f1836;
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
    }
    .summary .k{color:var(--muted);font-size:12px;margin-bottom:6px}
    .summary .v{font-weight:800;font-size:18px}
    @media (max-width:1000px){
      .grid{grid-template-columns:1fr}
      .summary,.meta{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:640px){
      .summary,.meta{grid-template-columns:1fr}
      h1{font-size:26px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>PMU Moulinette 2026</h1>
      <div class="subtitle">
        Interface unique : import automatique de la date choisie, analyse complète de la journée
        et calcul du bilan financier du jour.
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Pilotage</h2>

        <label>Date (JJMMAAAA)</label>
        <input id="date" value="16042026" />

        <div class="btns">
          <button id="btnImport" onclick="runPipeline()">Importer et préparer</button>
          <button id="btnAnalyse" class="secondary" onclick="runAnalysis()">Lancer l’analyse</button>
          <button id="btnGains" class="third" onclick="runPnl()">Calculer les gains du jour</button>
        </div>

        <div class="status" id="statusBox">Prêt.</div>
      </div>

      <div class="panel">
        <div class="result-head">
          <h2 style="margin:0">Résultats</h2>
          <div class="pill warn" id="resultState">Aucune action</div>
        </div>

        <div id="summary" class="summary" style="display:none;"></div>
        <div id="results" class="cards"></div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const BASE_URL = "http://localhost/pmu";

    function setStatus(message, isError = false) {
      $("statusBox").textContent = message;
      $("statusBox").style.color = isError ? "#ffb3b3" : "#aab6dc";
    }

    function setResultState(text, mode = "warn") {
      const el = $("resultState");
      el.textContent = text;
      el.className = "pill " + mode;
    }

    function safeParseJson(text) {
      if (typeof text !== "string") return null;

      let cleaned = text.replace(/^\uFEFF/, "").trim();

      try {
        return JSON.parse(cleaned);
      } catch {}

      const firstBrace = cleaned.indexOf("{");
      const lastBrace = cleaned.lastIndexOf("}");
      if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
        const jsonCandidate = cleaned.slice(firstBrace, lastBrace + 1);
        try {
          return JSON.parse(jsonCandidate);
        } catch {}
      }

      const firstBracket = cleaned.indexOf("[");
      const lastBracket = cleaned.lastIndexOf("]");
      if (firstBracket !== -1 && lastBracket !== -1 && lastBracket > firstBracket) {
        const jsonCandidate = cleaned.slice(firstBracket, lastBracket + 1);
        try {
          return JSON.parse(jsonCandidate);
        } catch {}
      }

      return null;
    }

    async function callScript(script, params = {}) {
      const url = new URL(`${BASE_URL}/${script}`);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));

      const res = await fetch(url.toString());
      const txt = await res.text();
      const json = safeParseJson(txt);

      if (!json) {
        throw new Error(`Réponse non JSON sur ${script}`);
      }

      if (!json.success) {
        throw new Error(json.message || `Erreur sur ${script}`);
      }

      return json;
    }

    function renderImportResult(lines) {
      $("results").innerHTML = `
        <div class="result-card">
          <div class="result-head">
            <div class="title">Pipeline terminé</div>
            <div class="pill ok">Succès</div>
          </div>
          <div class="status">${lines.join("<br>")}</div>
        </div>
      `;
    }

    function renderSelectionCard(item) {
      const selection = item.selection;

      const selectionHtml = selection
        ? `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>N°</th>
                  <th>Nom</th>
                  <th>Profil</th>
                  <th>JT Score</th>
                  <th>Cote</th>
                  <th>Valeur handicap</th>
                  <th>Mise Kelly</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>${selection.num}</td>
                  <td>${selection.nom}</td>
                  <td>P${selection.profil}</td>
                  <td>${selection.jt_score}</td>
                  <td>${selection.cote}</td>
                  <td>${selection.valeur_handicap ?? "—"}</td>
                  <td>${selection.mise_kelly} €</td>
                </tr>
              </tbody>
            </table>
          </div>`
        : `<div class="pill warn">Aucun qualifié final — abstention</div>`;

      return `
        <div class="result-card">
          <div class="result-head">
            <div class="title">${item.reunion} ${item.course} — ${item.libelle}</div>
            <div class="pill ${selection ? "ok" : "warn"}">${selection ? "Sélection validée" : "Abstention"}</div>
          </div>
          <div class="meta">
            <div class="box"><div class="k">Discipline</div><div class="v">${item.discipline ?? "—"}</div></div>
            <div class="box"><div class="k">Distance</div><div class="v">${item.distance ?? "—"}</div></div>
            <div class="box"><div class="k">Candidats finaux</div><div class="v">${item.candidats_eligibles_count}</div></div>
            <div class="box"><div class="k">Statut</div><div class="v">${item.statut ?? "—"}</div></div>
          </div>
          ${selectionHtml}
        </div>`;
    }

    function renderPnlTable(details) {
      return `
        <div class="result-card">
          <div class="result-head">
            <div class="title">Bilan des gains du jour</div>
            <div class="pill ok">Calculé</div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Réunion</th>
                  <th>Course</th>
                  <th>Libellé</th>
                  <th>Sélection</th>
                  <th>Mise</th>
                  <th>Ordre arrivée</th>
                  <th>Statut</th>
                  <th>Résultat net</th>
                </tr>
              </thead>
              <tbody>
                ${details.map(d => `
                  <tr>
                    <td>${d.reunion}</td>
                    <td>${d.course}</td>
                    <td>${d.libelle}</td>
                    <td>${d.selection ? `${d.selection.num} - ${d.selection.nom}` : "Aucune"}</td>
                    <td>${d.mise ?? 0} €</td>
                    <td>${d.ordre_arrivee ?? "—"}</td>
                    <td>${d.statut}</td>
                    <td>${d.resultat_net} €</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    async function runPipeline() {
      const date = $("date").value.trim();
      if (!date) {
        setStatus("Entre une date au format JJMMAAAA.", true);
        return;
      }

      $("btnImport").disabled = true;
      $("btnAnalyse").disabled = true;
      $("btnGains").disabled = true;
      $("results").innerHTML = "";
      $("summary").style.display = "none";
      setResultState("Pipeline en cours", "warn");

      try {
        setStatus("1/5 Import des courses...");
        const a = await callScript("fetch_to_sqlite.php", { date });

        setStatus("2/5 Réparation drivers/jockeys...");
        const b = await callScript("repair_driver_jockey.php", { date, date_filter: date });

        setStatus("3/5 Construction JT...");
        const c = await callScript("build_jt_reference_from_base.php", { min_courses: 1 });

        setStatus("4/5 Injection des cotes du jour...");
        const d = await callScript("inject_market_odds_day_from_raw.php", { date });

        setStatus("5/5 Rebuild des inputs moulinette...");
        const e = await callScript("build_moulinette_inputs.php", { date });

        $("summary").style.display = "grid";
        $("summary").innerHTML = `
          <div class="box"><div class="k">Date importée</div><div class="v">${date}</div></div>
          <div class="box"><div class="k">Courses</div><div class="v">${a.total_courses_processed ?? 0}</div></div>
          <div class="box"><div class="k">Participants</div><div class="v">${a.total_participants_inserted ?? 0}</div></div>
          <div class="box"><div class="k">Qualifiés finaux</div><div class="v">${e.stats?.qualifies_final ?? 0}</div></div>
        `;

        renderImportResult([
          `Drivers réparés : ${b.updated ?? 0}`,
          `Couples JT construits : ${c.jt_pairs_built ?? 0}`,
          `Cotes injectées : ${d.inserted ?? 0}`,
          `Courses touchées par les cotes : ${d.courses_touched ?? 0}`,
          `Inputs moulinette upserted : ${e.rows_upserted ?? 0}`,
          `Qualifiés Q5 : ${e.stats?.qualifies_q5 ?? 0}`,
          `Qualifiés finaux : ${e.stats?.qualifies_final ?? 0}`
        ]);

        setResultState("Pipeline terminé", "ok");
        setStatus("Import et préparation terminés avec succès.");
      } catch (err) {
        setResultState("Erreur pipeline", "no");
        setStatus(err.message, true);
        $("results").innerHTML = `
          <div class="result-card">
            <div class="result-head">
              <div class="title">Erreur pipeline</div>
              <div class="pill no">Erreur</div>
            </div>
            <div class="status">${err.message}</div>
          </div>
        `;
      } finally {
        $("btnImport").disabled = false;
        $("btnAnalyse").disabled = false;
        $("btnGains").disabled = false;
      }
    }

    async function runAnalysis() {
      const date = $("date").value.trim();
      if (!date) {
        setStatus("Entre une date au format JJMMAAAA.", true);
        return;
      }

      $("btnImport").disabled = true;
      $("btnAnalyse").disabled = true;
      $("btnGains").disabled = true;
      $("results").innerHTML = "";
      $("summary").style.display = "none";
      setResultState("Analyse en cours", "warn");

      try {
        setStatus("Analyse de la journée en cours...");
        const json = await callScript("query_day_moulinette_summary.php", { date });

        const data = Array.isArray(json.data) ? json.data : [];
        const jouees = data.filter(x => x.selection !== null).length;
        const abstentions = data.length - jouees;

        $("summary").style.display = "grid";
        $("summary").innerHTML = `
          <div class="box"><div class="k">Date</div><div class="v">${json.date}</div></div>
          <div class="box"><div class="k">Courses analysées</div><div class="v">${json.courses_count ?? 0}</div></div>
          <div class="box"><div class="k">Courses jouées</div><div class="v">${jouees}</div></div>
          <div class="box"><div class="k">Abstentions</div><div class="v">${abstentions}</div></div>
        `;

        $("results").innerHTML = "";
        data.forEach(item => {
          $("results").insertAdjacentHTML("beforeend", renderSelectionCard(item));
        });

        setResultState("Analyse terminée", "ok");
        setStatus(`Analyse terminée : ${jouees} course(s) jouée(s), ${abstentions} abstention(s).`);
      } catch (err) {
        setResultState("Erreur analyse", "no");
        setStatus(err.message, true);
        $("results").innerHTML = `
          <div class="result-card">
            <div class="result-head">
              <div class="title">Erreur analyse</div>
              <div class="pill no">Erreur</div>
            </div>
            <div class="status">${err.message}</div>
          </div>
        `;
      } finally {
        $("btnImport").disabled = false;
        $("btnAnalyse").disabled = false;
        $("btnGains").disabled = false;
      }
    }

    async function runPnl() {
      const date = $("date").value.trim();
      if (!date) {
        setStatus("Entre une date au format JJMMAAAA.", true);
        return;
      }

      $("btnImport").disabled = true;
      $("btnAnalyse").disabled = true;
      $("btnGains").disabled = true;
      $("results").innerHTML = "";
      $("summary").style.display = "none";
      setResultState("Calcul gains en cours", "warn");

      try {
        setStatus("Calcul des gains du jour...");
        const json = await callScript("query_day_moulinette_pnl.php", { date });

        $("summary").style.display = "grid";
        $("summary").innerHTML = `
          <div class="box"><div class="k">Bankroll départ</div><div class="v">${json.bankroll_depart} €</div></div>
          <div class="box"><div class="k">Paris joués</div><div class="v">${json.nb_paris}</div></div>
          <div class="box"><div class="k">Résultat net</div><div class="v">${json.resultat_net_total} €</div></div>
          <div class="box"><div class="k">Bankroll fin</div><div class="v">${json.bankroll_fin_theorique} €</div></div>
        `;

        $("results").innerHTML = renderPnlTable(json.details || []);

        setResultState("Gains calculés", "ok");
        setStatus(`Bilan terminé : ${json.nb_paris} pari(s), résultat net ${json.resultat_net_total} €.`);
      } catch (err) {
        setResultState("Erreur gains", "no");
        setStatus(err.message, true);
        $("results").innerHTML = `
          <div class="result-card">
            <div class="result-head">
              <div class="title">Erreur gains</div>
              <div class="pill no">Erreur</div>
            </div>
            <div class="status">${err.message}</div>
          </div>
        `;
      } finally {
        $("btnImport").disabled = false;
        $("btnAnalyse").disabled = false;
        $("btnGains").disabled = false;
      }
    }
  </script>
</body>
</html>
